name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: nightingale
            ffmpeg_url: https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
            ffmpeg_extract: tar -xJf ffmpeg_dl -C /tmp --wildcards '*/ffmpeg' --strip-components=1 && mv /tmp/ffmpeg vendor-bin/ffmpeg
            uv_url: https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-unknown-linux-gnu.tar.gz
            uv_extract: tar -xzf uv_dl -C /tmp && find /tmp -name 'uv' -type f -exec mv {} vendor-bin/uv \;

          - os: macos-14
            target: aarch64-apple-darwin
            artifact: nightingale
            ffmpeg_url: https://www.osxexperts.net/ffmpeg7arm.zip
            ffmpeg_extract: unzip -o ffmpeg_dl -d /tmp/ffx && mv /tmp/ffx/ffmpeg vendor-bin/ffmpeg
            uv_url: https://github.com/astral-sh/uv/releases/latest/download/uv-aarch64-apple-darwin.tar.gz
            uv_extract: tar -xzf uv_dl -C /tmp && find /tmp -name 'uv' -type f -exec mv {} vendor-bin/uv \;

          - os: macos-13
            target: x86_64-apple-darwin
            artifact: nightingale
            ffmpeg_url: https://www.osxexperts.net/ffmpeg7intel.zip
            ffmpeg_extract: unzip -o ffmpeg_dl -d /tmp/ffx && mv /tmp/ffx/ffmpeg vendor-bin/ffmpeg
            uv_url: https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-apple-darwin.tar.gz
            uv_extract: tar -xzf uv_dl -C /tmp && find /tmp -name 'uv' -type f -exec mv {} vendor-bin/uv \;

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nightingale.exe
            ffmpeg_url: https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
            ffmpeg_extract: 7z e ffmpeg_dl -ovendor-bin ffmpeg.exe -r -y
            uv_url: https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip
            uv_extract: 7z e uv_dl -ovendor-bin uv.exe -r -y

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

      - name: Fetch vendor binaries
        run: |
          mkdir -p vendor-bin
          curl -L "${{ matrix.ffmpeg_url }}" -o ffmpeg_dl
          ${{ matrix.ffmpeg_extract }}
          curl -L "${{ matrix.uv_url }}" -o uv_dl
          ${{ matrix.uv_extract }}
          rm -f ffmpeg_dl uv_dl
        shell: bash

      - name: Mark vendor binaries executable
        if: runner.os != 'Windows'
        run: chmod +x vendor-bin/*

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../nightingale-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ../../../nightingale-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: nightingale-${{ matrix.target }}
          path: nightingale-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: nightingale-*
