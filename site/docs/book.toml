[book]
title = "Nightingale Documentation"
description = "Documentation for Nightingale, an open-source karaoke app that turns any song into karaoke with stem separation, lyrics transcription, and pitch scoring."
authors = ["Nightingale Contributors"]
language = "en"
src = "src"

[output.html]
default-theme = "nightingale"
preferred-dark-theme = "nightingale"
additional-css = ["theme/nightingale.css"]
additional-js = ["theme/sidebar-link.js", "theme/mermaid-init.js"]
git-repository-url = "https://github.com/rzru/nightingale"
site-url = "/docs/"
